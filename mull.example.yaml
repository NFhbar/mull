# Multi-source mull config. Each entry under `sources:` indexes one
# (chain, contract, topics) tuple into a shared SQLite database.
#
# Single-source legacy configs (top-level rpc_url/contract/etc) are still
# accepted via a backward-compat shim — they load as one source named
# "default". See MIGRATION.md.

db_path: ./mull.db

# Global polling cadence used by the polling head source and the
# WebSocket fallback. Per-source head_source_fallback_after overrides
# only the WS demotion window.
poll_interval: 5s

# RPC retry knobs (optional — defaults shown below). Transient errors
# (5xx, 429, network blips) are retried with exponential backoff + jitter.
# These are global; each source's HTTP client picks them up.
rpc_retry_base: 500ms
rpc_retry_max_delay: 30s
rpc_retry_max_attempts: 5

# Bounded worker pool for catch-up. Applies PER SOURCE — running with
# concurrency=4 and three sources means up to 12 in-flight RPC requests
# at peak. A WARN log fires at boot when len(sources) * concurrency > 16
# so you spot the aggregate before hitting a 429 cliff.
concurrency: 1

# Reorg detection horizon. The indexer keeps the last `reorg_depth`
# block headers PER SOURCE and walks parent-hash on each head reconcile
# to detect divergence.
reorg_depth: 64

sources:
  - name: usdc_mainnet
    rpc_url: https://cloudflare-eth.com
    # Optional WSS endpoint for eth_subscribe("newHeads"). Required when
    # head_source is "ws"; recommended for "auto" if your provider offers it.
    ws_rpc_url: ""
    contract: "0xA0b86991c6218b36c1d19D4a2e9Eb0cE3606eB48"  # USDC mainnet
    topics:
      - "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"  # Transfer
    start_block: 19000000
    chunk_size: 500
    # Path to the contract ABI JSON used by `mull codegen` to emit typed
    # event structs. Empty disables codegen for this source.
    abi_path: ""
    # How the indexer learns about new chain heads:
    #   ws    — eth_subscribe("newHeads") over WSS; requires ws_rpc_url
    #   poll  — eth_getBlockByNumber("latest") on poll_interval (pre-WSS behaviour)
    #   auto  — ws when ws_rpc_url is set, otherwise poll (default)
    head_source: auto
    head_source_fallback_after: 30s

  - name: usdc_arbitrum
    rpc_url: https://arb1.arbitrum.io/rpc
    ws_rpc_url: ""
    contract: "0xaf88d065e77c8cC2239327C5EDb3A432268e5831"  # USDC on Arbitrum
    topics:
      - "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef"  # Transfer
    start_block: 200000000
    chunk_size: 1000
    abi_path: ""
    head_source: auto
    head_source_fallback_after: 30s
